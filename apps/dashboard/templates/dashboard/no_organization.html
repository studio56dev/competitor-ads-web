{% extends "base.html" %}

{% block title %}Erişim yok{% endblock %}

{% block content %}
<header class="page-head">
  <h1>Henüz bir organizasyona bağlı değilsin</h1>
  <div class="meta">Yöneticine bu hesabı bir organizasyona eklemesini söyle.</div>
</header>
<div class="empty">
  Kullanıcı: <code>{{ user.username }}</code> · {{ user.email }}<br>
  <form method="post" action="{% url 'logout' %}" style="margin-top:16px;">
    {% csrf_token %}
    <button class="btn-secondary" type="submit">Çıkış yap</button>
  </form>
</div>
{% endblock %}
